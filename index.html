<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anchor Faith Streaming</title>
    <meta
      name="description"
      content="A responsive, Webflow-friendly streaming browse experience for Anchor Faith Church sermon and podcast content."
    />
    <link rel="stylesheet" href="./styles.css?v=20260707-actions-cache" />
  </head>
  <body>
    <div class="af-app" data-component="anchor-faith-streaming-app">
      <main id="browse" class="af-main" data-cms-surface="streaming-home">
        <section id="featuredHero" class="af-hero" data-component="hero-component"></section>

        <section id="sermons" class="af-browse" aria-label="Sermon shelves">
          <div id="primaryShelves" class="af-shelf-stack" data-shelf-region="primary"></div>

          <div
            id="extraShelves"
            class="af-extra-shelves"
            data-shelf-region="filtered-playlists"
            aria-hidden="true"
          ></div>

          <div class="af-view-more" hidden>
            <button
              id="viewMoreButton"
              class="af-button af-button--secondary"
              type="button"
              aria-expanded="false"
              aria-controls="extraShelves"
            >
              View More
            </button>
          </div>

          <div id="podcasts" class="af-audio-region" data-shelf-region="audio"></div>
        </section>
      </main>
    </div>

    <div
      id="sermonModal"
      class="af-modal"
      data-component="sermon-modal-component"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
      aria-labelledby="modalTitle"
    >
      <div class="af-modal__backdrop" data-close-modal></div>
      <div class="af-modal__shell" role="document">
        <button class="af-icon-button af-modal__close" type="button" data-close-modal aria-label="Close">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6 6 12 12M18 6 6 18" />
          </svg>
          <span class="af-modal__close-label">Close</span>
        </button>
        <div id="modalContent" class="af-modal__content"></div>
      </div>
    </div>

    <script src="./media-cache.js?v=20260707-actions-cache"></script>
    <script src="./prototype-data.js?v=20260707-actions-cache"></script>
    <script src="./script.js?v=1.1.8-actions-cache"></script>
    <script>
  (function () {
    let heightFrame = 0;
    let lastSentHeight = 0;
    let lastSentAt = 0;

    function debugIframe(message, details) {
      if (!window.AFC_DEBUG_IFRAME) return;
      console.log(`[AFC iframe] ${message}`, details || {});
    }

    function appHeight() {
      const app = document.querySelector(".af-app");
      const modal = document.getElementById("sermonModal");
      const appBottom = app ? app.getBoundingClientRect().bottom + window.scrollY : document.body.scrollHeight;
      const modalBottom = modal && modal.classList.contains("is-open")
        ? modal.getBoundingClientRect().bottom + window.scrollY
        : 0;

      return Math.ceil(Math.max(appBottom, modalBottom));
    }

    function sendAfcHeight() {
      heightFrame = 0;
      const height = appHeight();
      const now = Date.now();
      if (Math.abs(height - lastSentHeight) < 2 && now - lastSentAt < 800) return;
      lastSentHeight = height;
      lastSentAt = now;

      window.parent.postMessage(
        {
          type: "AFC_STREAM_HEIGHT",
          height
        },
        "*"
      );
      debugIframe("sent iframe height", { height });
    }

    function queueAfcHeight() {
      if (heightFrame) return;
      heightFrame = window.requestAnimationFrame(sendAfcHeight);
    }

    window.addEventListener("load", queueAfcHeight);
    window.addEventListener("resize", queueAfcHeight);

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(queueAfcHeight).catch(function () {});
    }

    document.addEventListener("load", function (event) {
      if (event.target && event.target.tagName === "IMG") queueAfcHeight();
    }, true);

    if ("ResizeObserver" in window) {
      const heightObserver = new ResizeObserver(queueAfcHeight);
      heightObserver.observe(document.querySelector(".af-app") || document.body);
      const modal = document.getElementById("sermonModal");
      if (modal) heightObserver.observe(modal);
    }

    const modal = document.getElementById("sermonModal");
    if (modal && "MutationObserver" in window) {
      new MutationObserver(queueAfcHeight).observe(modal, { attributes: true, attributeFilter: ["class", "aria-hidden"] });
    }

    queueAfcHeight();
  })();
</script>
  </body>
</html>
