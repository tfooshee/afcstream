name: Build and deploy Anchor Faith Streaming

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh the generated media cache daily at 8:00 UTC.
    - cron: '0 8 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Generate media cache and package site
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install project dependencies
        run: npm install --no-audit --no-fund

      - name: Generate real media cache
        run: npm run generate:cache
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          # Keep enabled so the build fails instead of publishing podcast episodes without Spotify embeds.
          REQUIRE_SPOTIFY_EPISODES: "1"

      - name: Verify generated cache files exist
        run: |
          test -s media-cache.json
          test -s media-cache.js
          node --check script.js
          node --check scripts/generate-media-cache.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
